server:
  port: 8088  # 8080 대신 8088 사용

spring:
  h2:
    console:
      enabled: true      # 웹에서 DB를 볼 수 있게 함
      path: /h2-console  # 접속 주소
  datasource:
    url: jdbc:h2:./sbbhome
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update   # 엔티티 변경 시 테이블 자동 업데이트
    show-sql: true       # 실행되는 SQL을 콘솔에 출력
    properties:
      hibernate:
        format_sql: true # SQL을 보기 좋게 정렬